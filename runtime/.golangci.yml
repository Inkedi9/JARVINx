version: "2"

linters:
  enable:
    - errcheck # variables d'erreur ignorées
    - gosimple # simplifications Go idiomatiques
    - govet # erreurs de compilation détectées par vet
    - ineffassign # assignations inutiles
    - staticcheck # analyse statique avancée
    - unused # code mort
    - gofmt # formatage standard
    - goimports # imports non triés ou manquants
    - misspell # fautes d'orthographe dans les commentaires
    - prealloc # slices à pré-allouer

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable:
      - shadow # variables qui masquent une variable parente

issues:
  exclude-rules:
    # Les fichiers de test ont le droit d'ignorer certaines erreurs
    - path: _test\.go
      linters:
        - errcheck
