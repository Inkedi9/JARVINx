version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - gofmt
    - goimports
    - misspell
    - prealloc
  settings:
    errcheck:
      check-type-assertions: true
    govet:
      enable:
        - shadow

issues:
  exclude-rules:
    # Les fichiers de test ont le droit d'ignorer certaines erreurs
    - path: _test\.go
      linters:
        - errcheck
