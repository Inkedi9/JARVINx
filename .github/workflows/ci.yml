name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # Job 1 — Backend Go (runtime/)
  # ─────────────────────────────────────────
  go:
    name: Go — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: runtime/go.mod
          cache: true
          cache-dependency-path: runtime/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: runtime
          args: --timeout=5m

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out

  # ─────────────────────────────────────────
  # Job 2 — Dashboard Next.js (dashboard/)
  # ─────────────────────────────────────────
  dashboard:
    name: Dashboard — Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm test -- --passWithNoTests --ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_RUNTIME_URL: http://localhost:8080
